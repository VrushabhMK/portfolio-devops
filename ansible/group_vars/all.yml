---
# Common variables for all hosts
project_name: portfolio-devops
docker_compose_version: "2.24.0"
kubectl_version: "1.29.0"
minikube_version: "1.32.0"
jenkins_version: "lts"
node_version: "20"

# Docker Hub credentials (set these before running)
docker_hub_username: "{{ lookup('env', 'DOCKER_HUB_USERNAME') }}"
docker_hub_password: "{{ lookup('env', 'DOCKER_HUB_PASSWORD') }}"

# Application paths
app_dir: /opt/portfolio
repo_url: "https://github.com/your-username/portfolio-devops.git"
