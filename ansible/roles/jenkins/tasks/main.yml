---
# Jenkins installation role
- name: Install Jenkins
  block:
    - name: Create Jenkins data directory
      file:
        path: /var/jenkins_home
        state: directory
        mode: '0755'

    - name: Run Jenkins container
      docker_container:
        name: jenkins
        image: "jenkins/jenkins:{{ jenkins_version }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "8080:8080"
          - "50000:50000"
        volumes:
          - jenkins_home:/var/jenkins_home
          - /var/run/docker.sock:/var/run/docker.sock
        env:
          JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"

    - name: Wait for Jenkins to start
      wait_for:
        port: 8080
        host: localhost
        delay: 30
        timeout: 300

    - name: Get Jenkins initial admin password
      command: docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
      register: jenkins_password
      changed_when: false

    - name: Display Jenkins initial password
      debug:
        msg: "Jenkins initial admin password: {{ jenkins_password.stdout }}"

    - name: Install Jenkins plugins
      jenkins_plugin:
        name: "{{ item }}"
        url: "http://localhost:8080"
        jenkins_user: admin
        jenkins_password: "{{ jenkins_password.stdout }}"
      loop:
        - git
        - github
        - docker
        - pipeline
        - kubernetes
        - credentials
        - workflow-aggregator
      ignore_errors: yes
