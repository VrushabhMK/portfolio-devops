---
# Ansible inventory file
# Update with your EC2 instance IP after Terraform provisions infrastructure

all:
  hosts:
    portfolio-server:
      ansible_host: YOUR_EC2_PUBLIC_IP
      ansible_user: ubuntu
      ansible_ssh_private_key_file: ~/.ssh/portfolio-key.pem
      ansible_python_interpreter: /usr/bin/python3

  children:
    webservers:
      hosts:
        portfolio-server:

    dbservers:
      hosts:
        portfolio-server:
