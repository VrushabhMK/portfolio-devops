---
# Ansible inventory - EC2 Instance: i-00efc8195ddaca37a
# Set EC2_PUBLIC_IP env var or replace ansible_host below

all:
  hosts:
    portfolio-server:
      ansible_host: "{{ lookup('env', 'EC2_PUBLIC_IP') | default('YOUR_EC2_PUBLIC_IP') }}"
      ansible_user: ubuntu
      ansible_ssh_private_key_file: ~/.ssh/portfolio-key.pem
      ansible_python_interpreter: /usr/bin/python3
      ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

  children:
    webservers:
      hosts:
        portfolio-server:
