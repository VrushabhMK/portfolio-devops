apiVersion: v1
kind: Secret
metadata:
  name: portfolio-secrets
  namespace: portfolio
type: Opaque
stringData:
  MONGODB_URI: "mongodb://admin:password123@mongodb:27017/portfolio?authSource=admin"
  MONGODB_PASSWORD: "password123"
  JWT_SECRET: "production-jwt-secret-change-this"
  JWT_EXPIRE: "7d"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-config
  namespace: portfolio
data:
  NODE_ENV: "production"
  PORT: "5000"
  FRONTEND_URL: "http://portfolio.example.com"
